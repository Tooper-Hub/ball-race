<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stream Ball Race - Stable Connect</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { --bg: #0d0d12; --accent: #00f2ff; --win: #00ff99; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Impact', sans-serif; display: flex; width: 1920px; height: 1080px; overflow: hidden; }
        #game-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        canvas { background: #000; border: 5px solid #222; border-radius: 30px; }
        #sidebar { width: 400px; background: #1a1a24; border-left: 10px solid var(--accent); padding: 30px; display: flex; flex-direction: column; }
        
        .connect-btn { background: var(--accent); color: black; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; font-family: sans-serif; }
        .connect-btn:hover { background: white; }
        
        .timer { font-size: 100px; color: var(--accent); text-align: center; margin-bottom: 20px; }
        .list { flex: 1; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; font-size: 24px; overflow-y: auto; border: 1px solid #333; }
        #status-light { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: red; margin-right: 5px; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="1300" height="1000"></canvas>
    <div id="win-msg" style="position: absolute; display: none; text-align: center; font-size: 100px; text-shadow: 0 0 20px var(--win);">
        WINNER:<br><span id="winner-name" style="color:var(--win)"></span>
    </div>
</div>

<div id="sidebar">
    <button class="connect-btn" onclick="openChat()">STEP 1: CONNECT CHAT</button>
    
    <div class="timer" id="countdown">60</div>
    
    <div style="font-family: sans-serif; font-size: 14px; margin-bottom: 20px;">
        <span id="status-light"></span> STATUS: <span id="status-text">DISCONNECTED</span>
    </div>

    <div style="color:var(--accent); font-size:20px; margin-bottom:10px;">PLAYERS:</div>
    <div id="playerList" class="list"></div>
</div>

<script>
// Game Logic (Matter.js)
const { Engine, World, Bodies, Body } = Matter;
const engine = Engine.create();
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
engine.world.gravity.y = 1.5;

let queue = [];
let activeBalls = [];
let ringParts = [];
let isPlaying = false;
let timer = 60;
let ringAngle = 0;

// Create Arena
const radius = 450, thickness = 40, segments = 50, gap = 6;
for (let i = 0; i < segments - gap; i++) {
    const p = Bodies.rectangle(650, 500, (Math.PI * 2 * radius / segments) + 10, thickness, { isStatic: true, restitution: 1.2 });
    ringParts.push(p);
    World.add(engine.world, p);
}

// 1. OPEN CHAT FUNCTION
function openChat() {
    const streamID = prompt("Paste your YouTube Video ID (the part after v=):", "YpSfvTQ9Jrg");
    if (streamID) {
        window.chatWindow = window.open(`https://www.youtube.com/live_chat?v=${streamID}`, "ytChat", "width=400,height=600");
        document.getElementById('status-text').innerText = "CHAT OPENED - RUN SCRIPT";
        document.getElementById('status-light').style.background = "orange";
    }
}

// 2. RECEIVE MESSAGE FUNCTION
window.addEventListener("message", (event) => {
    if (event.data.type === "PLAYER_JOIN") {
        const name = event.data.user;
        if (!queue.includes(name) && !isPlaying) {
            queue.push(name);
            document.getElementById('playerList').innerHTML = queue.map(n => `<div>👤 ${n}</div>`).join('');
            document.getElementById('status-text').innerText = "CONNECTED - RECEIVING";
            document.getElementById('status-light').style.background = "#00ff99";
        }
    }
});

function startRace() {
    isPlaying = true;
    timer = 0;
    const participants = [...queue, "Bot-Alpha", "Bot-Beta", "Bot-Gamma"];
    participants.forEach((name, i) => {
        const b = Bodies.circle(650, 450, 18, {
            restitution: 1.1, friction: 0,
            plugin: { name, color: `hsl(${(i * 137) % 360}, 70%, 60%)` }
        });
        activeBalls.push(b);
        World.add(engine.world, b);
    });
}

function loop() {
    Engine.update(engine, 1000/60);
    ringAngle += 0.025;
    ringParts.forEach((p, i) => {
        const a = (i / segments) * Math.PI * 2 + ringAngle;
        Body.setPosition(p, { x: 650 + Math.cos(a) * radius, y: 500 + Math.sin(a) * radius });
        Body.setAngle(p, a);
    });

    if (isPlaying) {
        for (let i = activeBalls.length - 1; i >= 0; i--) {
            const b = activeBalls[i];
            const d = Math.hypot(b.position.x - 650, b.position.y - 500);
            if (d > radius + 100) {
                World.remove(engine.world, b);
                activeBalls.splice(i, 1);
            }
        }
        if (activeBalls.length === 1 && isPlaying) {
            isPlaying = false;
            document.getElementById('winner-name').innerText = activeBalls[0].plugin.name;
            document.getElementById('win-msg').style.display = 'block';
            setTimeout(() => { location.reload(); }, 8000);
        }
    }

    ctx.clearRect(0, 0, 1300, 1000);
    ctx.fillStyle = "#333";
    ringParts.forEach(p => {
        ctx.beginPath(); p.vertices.forEach(v => ctx.lineTo(v.x, v.y)); ctx.fill();
    });
    activeBalls.forEach(b => {
        ctx.fillStyle = b.plugin.color;
        ctx.beginPath(); ctx.arc(b.position.x, b.position.y, 18, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "white"; ctx.font = "16px Arial"; ctx.textAlign = "center";
        ctx.fillText(b.plugin.name, b.position.x, b.position.y - 25);
    });
    requestAnimationFrame(loop);
}

setInterval(() => {
    if (timer > 0 && !isPlaying) {
        timer--;
        document.getElementById('countdown').innerText = timer;
        if (timer <= 0) startRace();
    }
}, 1000);
loop();
</script>
</body>
</html>
